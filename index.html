<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <!-- ── Global toolbar ───────────────────────────────────────── -->
    <div id="toolbar">
      <span id="toolbar-title">Dashboard</span>
      <button id="theme-toggle" type="button" aria-label="Switch to light mode" title="Toggle light / dark mode">
        ☀️
      </button>
    </div>

    <!-- ── Greeting Panel ───────────────────────────────────────── -->
    <section id="greeting-panel">
      <p id="greeting-time"></p>
      <p id="greeting-date"></p>

      <!-- greeting text + inline name editor -->
      <div id="greeting-row">
        <p id="greeting-text"></p>
        <button id="greeting-name-edit-btn" type="button" aria-label="Set your name" title="Set your name">✏️</button>
      </div>
      <!-- name editor (hidden by default) -->
      <div id="greeting-name-form" hidden>
        <input
          id="greeting-name-input"
          type="text"
          maxlength="50"
          placeholder="Your name…"
          aria-label="Your name"
        />
        <button id="greeting-name-save-btn" type="button">Save</button>
        <button id="greeting-name-cancel-btn" type="button">Cancel</button>
      </div>
    </section>

    <!-- ── Focus Timer Panel ────────────────────────────────────── -->
    <section id="timer-panel">
      <p id="timer-display"></p>
      <div class="timer-controls">
        <button id="timer-start" type="button">Start</button>
        <button id="timer-stop"  type="button">Stop</button>
        <button id="timer-reset" type="button">Reset</button>
      </div>

      <!-- custom duration row -->
      <div id="timer-duration-row">
        <label for="timer-duration-input">Duration (min)</label>
        <input
          id="timer-duration-input"
          type="number"
          min="1"
          max="99"
          value="25"
          aria-label="Timer duration in minutes"
        />
        <button id="timer-duration-set-btn" type="button">Set</button>
      </div>
    </section>

    <!-- ── To-Do List Panel ─────────────────────────────────────── -->
    <section id="todo-panel">
      <div class="todo-form">
        <input
          id="todo-input"
          type="text"
          maxlength="200"
          placeholder="Add a new task…"
          aria-label="New task name"
        />
        <button id="todo-add-btn" type="button">Add</button>
      </div>
      <p class="todo-error" role="alert" aria-live="polite"></p>
      <ul id="todo-list"></ul>
    </section>

    <!-- ── Quick Links Panel ────────────────────────────────────── -->
    <section id="links-panel">
      <div class="links-form">
        <input
          id="link-label-input"
          type="text"
          maxlength="100"
          placeholder="Label"
          aria-label="Link label"
        />
        <input
          id="link-url-input"
          type="url"
          maxlength="2048"
          placeholder="https://example.com"
          aria-label="Link URL"
        />
        <button id="link-add-btn" type="button">Add Link</button>
      </div>
      <p class="links-error" role="alert" aria-live="polite"></p>
      <div id="links-grid"></div>
    </section>

    <script src="js/app.js" defer></script>
  </body>
</html>
